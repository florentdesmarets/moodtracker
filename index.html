<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#FF8C5A" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%' y='58%' text-anchor='middle' dominant-baseline='middle' font-size='72'>😊</text></svg>">    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="MoodTracker" />
    <title>MoodTracker</title>
    <link rel="manifest" href="%BASE_URL%manifest.json" />
    <script>
      // Restore SPA route redirected from 404.html
      ;(function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) { return s.replace(/~and~/g, '&') })
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded[0] + (decoded[1] ? '?' + decoded[1] : '') + l.hash)
        }
      }(window.location))
      // Capture l'event PWA AVANT que React monte (il peut arriver très tôt)
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault()
        window.__pwaInstallPrompt = e
      })
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => navigator.serviceWorker.register('%BASE_URL%sw.js'))
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
